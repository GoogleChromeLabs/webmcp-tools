<div class="app-push-container min-h-screen" [class.app-pushed]="(agentService.isOpen$ | async)">
    <app-header></app-header>
    <main>
        <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
</div>

<app-agent-drawer></app-agent-drawer>

    <app-cart-modal (close)="uiService.closeCart()">
    </app-cart-modal>
}
